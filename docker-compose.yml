version: "3.8"

services:
  # Main Gateway
  gateway:
    image: python:3.11-slim
    container_name: api_gateway
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - REDIS_HOST=redis
      - LOG_LEVEL=INFO
    command: >
      bash -c "pip install -r requirements.txt && 
               python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      - redis
    networks:
      - gateway_network

  # Redis for rate limiting
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gateway_network
    command: redis-server --appendonly yes

  # User Service
  user_service:
    image: python:3.11-slim
    container_name: user_service
    ports:
      - "8001:8001"
    volumes:
      - ./downstream_services/user_service:/app
    working_dir: /app
    environment:
      - LOG_LEVEL=INFO
    command: >
      bash -c "pip install fastapi uvicorn && 
               python -m uvicorn main:app --host 0.0.0.0 --port 8001"
    networks:
      - gateway_network

  # Order Service
  order_service:
    image: python:3.11-slim
    container_name: order_service
    ports:
      - "8002:8002"
    volumes:
      - ./downstream_services/order_service:/app
    working_dir: /app
    environment:
      - LOG_LEVEL=INFO
    command: >
      bash -c "pip install fastapi uvicorn && 
               python -m uvicorn main:app --host 0.0.0.0 --port 8002"
    networks:
      - gateway_network

  # AI Service
  ai_service:
    image: python:3.11-slim
    container_name: ai_service
    ports:
      - "8003:8003"
    volumes:
      - ./downstream_services/ai_service:/app
    working_dir: /app
    environment:
      - LOG_LEVEL=INFO
    command: >
      bash -c "pip install fastapi uvicorn pydantic && 
               python -m uvicorn main:app --host 0.0.0.0 --port 8003"
    networks:
      - gateway_network

networks:
  gateway_network:
    driver: bridge

volumes:
  redis_data:
